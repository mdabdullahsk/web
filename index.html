<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium IPTV Player</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            background-color: #0f172a; /* ডার্ক থিম */
            color: #f8fafc;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
        }
        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .channel-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .channel-card:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.5);
            border-color: #3b82f6;
        }
        .active-channel {
            border-color: #ef4444 !important;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.6) !important;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 font-sans">

    <header class="text-center mb-8">
        <h1 class="text-3xl md:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-red-500 pb-2">
            লাইভ টিভি স্ট্রিমিং
        </h1>
        <p class="text-slate-400 mt-2" id="status-text">আপনার পছন্দের চ্যানেল নির্বাচন করুন</p>
    </header>

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2">
            <div class="video-container">
                <video id="video" controls autoplay></video>
            </div>
            <div class="mt-4 flex justify-between items-center bg-slate-800 p-4 rounded-lg border border-slate-700">
                <div>
                    <span class="text-red-500 font-bold text-sm uppercase tracking-wider animate-pulse">● Live</span>
                    <h2 id="now-playing" class="text-xl font-semibold mt-1">কোনো চ্যানেল চলছে না</h2>
                </div>
            </div>
        </div>

        <div>
            <h3 class="text-xl font-semibold mb-4 border-b border-slate-700 pb-2">টিভি চ্যানেল সমূহ</h3>
            
            <div id="channel-list" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-2 gap-4 max-h-[500px] overflow-y-auto pr-2 scrollbar-hide">
                </div>
        </div>
    </div>

    <script>
        let hls; // HLS অবজেক্ট

        // চ্যানেল লিস্ট
        const channels = [
            { id: '1', name: 'T SPORTS', image: 'http://103.144.89.251/assets/images/T SPORTS1744972630.png' },
            { id: '2', name: 'STAR SPORTS 1', image: 'http://103.144.89.251/assets/images/STAR SPORTS 1 HD1744991778.png' },
            { id: '79', name: 'SOMOY TV', image: 'http://103.144.89.251/assets/images/SOMOY TV1745044149.png' },
            { id: '82', name: 'CHANNEL 24', image: 'http://103.144.89.251/assets/images/CHANNEL 241745044263.png' },
            { id: '56', name: 'GTV', image: 'http://103.144.89.251/assets/images/GTV1745042853.png' },
            { id: '77', name: 'INDEPENDENT', image: 'http://103.144.89.251/assets/images/INDEPENDENT TV1745044077.png' },
            { id: '18', name: 'STAR JALSHA', image: 'http://103.144.89.251/assets/images/STAR JALSHA HD1745033819.png' },
            { id: '14', name: 'ZEE BANGLA', image: 'http://103.144.89.251/assets/images/ZEE BANGLA HD1745033633.png' },
            { id: '8', name: 'CARTOON NETWORK', image: 'http://103.144.89.251/assets/images/CARTOON NETWORK1745033414.png' }
        ];

        // পেজ লোড হলে চ্যানেলগুলো স্ক্রিনে দেখানো
        function renderChannels() {
            const listContainer = document.getElementById('channel-list');
            listContainer.innerHTML = '';

            channels.forEach(channel => {
                const card = document.createElement('div');
                card.className = `channel-card bg-slate-800 border border-slate-700 rounded-lg p-3 text-center flex flex-col items-center justify-center h-28`;
                card.id = `channel-${channel.id}`;
                
                // চ্যানেল ক্লিক ইভেন্ট
                card.onclick = () => loadChannel(channel.id, channel.name);

                // ছবির লিঙ্ক কাজ না করলে শুধু নাম দেখাবে
                card.innerHTML = `
                    <img src="${channel.image}" alt="${channel.name}" onerror="this.style.display='none'" class="h-12 object-contain mb-2">
                    <span class="text-xs font-medium text-slate-300">${channel.name}</span>
                `;
                listContainer.appendChild(card);
            });
        }

        // চ্যানেল প্লে করার ফাংশন (CORS Proxy ব্যবহার করে সরাসরি ফ্রন্টএন্ড থেকে)
        async function loadChannel(channelId, channelName) {
            const statusText = document.getElementById('status-text');
            const nowPlaying = document.getElementById('now-playing');
            
            // সব কার্ড থেকে এক্টিভ ডিজাইন রিমুভ করা
            document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active-channel'));
            
            // যেটাতে ক্লিক করা হয়েছে সেটাকে হাইলাইট করা
            document.getElementById(`channel-${channelId}`).classList.add('active-channel');

            statusText.innerText = "লিঙ্ক খোঁজা হচ্ছে... দয়া করে অপেক্ষা করুন।";
            statusText.className = "text-yellow-400 mt-2 font-semibold";
            nowPlaying.innerText = `${channelName} (লোডিং...)`;

            try {
                // টার্গেট URL এবং CORS প্রক্সি URL
                const targetUrl = `http://103.144.89.251/player.php?stream=${channelId}`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

                // প্রক্সি সার্ভার থেকে ডেটা আনা
                const response = await fetch(proxyUrl);
                const data = await response.json();

                if (data.contents) {
                    const html = data.contents;
                    // Regex দিয়ে .m3u8 লিঙ্ক এবং টোকেন বের করা
                    const streamLinkMatch = html.match(/([^\s"'<>]+\.m3u8[^\s"'<>]*)/i);

                    if (streamLinkMatch && streamLinkMatch[0]) {
                        let streamUrl = streamLinkMatch[0];

                        // যদি লিঙ্কটি "http" দিয়ে শুরু না হয়, তবে মূল আইপি যুক্ত করা
                        if (!streamUrl.startsWith('http')) {
                            if (!streamUrl.startsWith('/')) {
                                streamUrl = '/' + streamUrl;
                            }
                            streamUrl = 'http://103.144.89.251' + streamUrl;
                        }

                        statusText.innerText = "সফলভাবে কানেক্ট হয়েছে!";
                        statusText.className = "text-green-400 mt-2 font-semibold";
                        nowPlaying.innerText = channelName;
                        
                        // ভিডিও প্লে করা
                        playVideo(streamUrl);
                    } else {
                        statusText.innerText = "লিঙ্ক পাওয়া যায়নি: এই চ্যানেলের কোনো স্ট্রিমিং লিঙ্ক নেই!";
                        statusText.className = "text-red-400 mt-2 font-semibold";
                    }
                } else {
                    throw new Error("প্রক্সি সার্ভার থেকে কোনো রেসপন্স আসেনি");
                }

            } catch (error) {
                console.error('Fetch Error:', error);
                statusText.innerText = "এরর: টার্গেট সাইটের সাথে কানেক্ট করা যায়নি!";
                statusText.className = "text-red-500 mt-2 font-semibold";
            }
        }

        // ভিডিও প্লেয়ারে স্ট্রিমিং লিঙ্ক চালানো
        function playVideo(streamUrl) {
            var video = document.getElementById('video');
            
            if (hls) { hls.destroy(); }

            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        }

        // শুরুতে চ্যানেলগুলো লোড করা
        renderChannels();
    </script>
</body>
</html>
